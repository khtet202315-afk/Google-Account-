<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Premium Store</title>
    <style>
        body {
            margin: 0; padding: 20px; font-family: -apple-system, sans-serif;
            min-height: 100vh; color: white;
            background: linear-gradient(45deg, #00c6ff, #0072ff, #764ba2, #ff0080);
            background-size: 300% 300%;
            animation: gradientMove 10s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .header-text { text-align: center; margin-bottom: 20px; font-size: 24px; }
        .package-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white; padding: 18px; border-radius: 20px;
            margin-bottom: 12px; display: flex; justify-content: space-between;
            width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .package-btn:hover { background: rgba(255, 255, 255, 0.3); }
        #msg-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #333; padding: 30px; border-radius: 30px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100; width: 85%;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 class="header-text">💎 MLBB Diamond Store</h2>
        <div id="package-container"></div>
    </div>

    <div id="msg-box">
        <h3 id="diamond-text" style="color:#764ba2;"></h3>
        <p>၁၀၀% အာမခံချက်ဖြင့်၊ စိန်ပမာဏသည် ၂၄ နာရီအတွင်း လူကြီးမင်းတို့၏ ဂိမ်းအကောင့်ထဲသို့ အောင်မြင်စွာ ရောက်ရှိပါမည်။</p>
        <button onclick="hideMsg()" style="padding:15px 40px; border-radius:15px; border:none; background:#764ba2; color:white; font-weight:bold; cursor:pointer;">OK</button>
    </div>

    <script>
        const diamonds = [5, 11, 22, 56, 86, 112];
        const container = document.getElementById('package-container');

        diamonds.forEach(d => {
            container.innerHTML += `
                <button class="package-btn" onclick="showMsg('${d}')">
                    <span>${d} Diamonds</span> 
                    <span style="background:#ff3b30; padding:4px 10px; border-radius:8px;">FREE</span>
                </button>`;
        });

        function showMsg(amount) { 
            document.getElementById('diamond-text').innerText = "✅ " + amount + " Diamonds";
            document.getElementById('msg-box').style.display = 'block'; 
        }
        function hideMsg() { document.getElementById('msg-box').style.display = 'none'; }
    </script>
</body>
</html>
